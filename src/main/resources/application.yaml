# Convencion de puertos PuckZone: gateway 8080, auth 8081, matchmaking 8082,
# game 8083, ranking 8084.
server:
  port: 8081

spring:
  application:
    name: puckzone-auth

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/puckzone_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    # Ver la nota extensa en puckzone-ranking: el Postgres compartido es B1ms
    # (max_connections = 50, no ampliable) y el default de Hikari (10 por
    # replica, incluso ociosa) agotaba el servidor entre los tres servicios
    # con JPA. Sin este techo, un deploy no puede levantar la revision nueva.
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_IDLE:2}

  jpa:
    hibernate:
      # dev: crea/actualiza el schema automaticamente.
      # En produccion cambiar a 'validate' y usar migraciones (Flyway).
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# Actuator: expone solo /actuator/health y habilita los grupos liveness/readiness
# que Azure Container Apps usa como health probes.
management:
  endpoints:
    web:
      exposure:
        # prometheus: métricas para el Prometheus interno del environment
        # (la app es interna: el endpoint no es alcanzable desde internet).
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

puckzone:
  jwt:
    # En produccion (Azure) sobreescribir con la variable de entorno PUCKZONE_JWT_SECRET.
    # El valor por defecto es SOLO para desarrollo local (HS256 requiere >= 32 bytes).
    secret: ${PUCKZONE_JWT_SECRET:puckzone-dev-secret-change-me-please-32bytes-min!!}
    # Access corto (1 hora): limita la ventana si un token se filtra.
    access-expiration-ms: 3600000
    # Refresh largo (7 dias): solo sirve en POST /api/auth/refresh.
    refresh-expiration-ms: 604800000