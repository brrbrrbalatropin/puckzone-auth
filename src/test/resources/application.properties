# Los tests corren contra H2 en memoria emulando Postgres (mismo patrón de
# ranking y game): no dependen del Postgres local ni del de Docker. Este
# archivo solo agrega/override propiedades; el application.yml principal se
# sigue cargando y .properties gana empates.
spring.datasource.url=jdbc:h2:mem:auth_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
